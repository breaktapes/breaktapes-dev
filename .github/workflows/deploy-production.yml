name: Deploy → Production

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight prod deploy

jobs:
  deploy:
    name: Deploy to app.breaktapes.com
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.breaktapes.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Node.js + build ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://kmdpufauamadwavqsinj.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_aXlZ54g7bW8dckyl3N-kCA_Jzy_Nt0B

      # ── 2. Push Supabase migrations → production ─────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to production Supabase
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
          supabase db push \
            --linked \
            --password ${{ secrets.SUPABASE_PROD_DB_PASSWORD }} \
            --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── 3. Deploy to Cloudflare Workers (production) ─────────────────────
      - name: Deploy to Cloudflare production
        run: npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── 4. Summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🚀 PRODUCTION DEPLOYED"
          echo "  URL    : https://app.breaktapes.com"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  By     : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
