name: CI

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Node.js + dependencies ────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 2. Run tests ─────────────────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── 3. Build ─────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 4. dist/index.html exists ────────────────────────────────────────
      - name: Check dist/index.html exists
        run: |
          if [ ! -f dist/index.html ]; then
            echo "❌ dist/index.html not found — build may have failed"
            exit 1
          fi
          echo "✅ dist/index.html exists"

      # ── 5. wrangler.toml has both environments ───────────────────────────
      - name: Check wrangler.toml environments
        run: |
          if ! grep -q 'app.breaktapes.com' wrangler.toml; then
            echo "❌ wrangler.toml missing production route (app.breaktapes.com)"
            exit 1
          fi
          if ! grep -q 'dev.breaktapes.com' wrangler.toml; then
            echo "❌ wrangler.toml missing staging route (dev.breaktapes.com)"
            exit 1
          fi
          if ! grep -q '\[env.staging\]' wrangler.toml; then
            echo "❌ wrangler.toml missing [env.staging] block"
            exit 1
          fi
          if ! grep -q 'directory = "dist"' wrangler.toml; then
            echo "❌ wrangler.toml assets.directory should be dist (not public)"
            exit 1
          fi
          echo "✅ wrangler.toml has both production and staging environments"

      # ── 6. dist/ size check (warn at 5MB, fail at 15MB) ─────────────────
      - name: Check dist/ bundle size
        run: |
          TOTAL=$(du -sb dist/ | cut -f1)
          TOTAL_MB=$(echo "scale=2; $TOTAL / 1048576" | bc)
          echo "dist/ total size: ${TOTAL_MB} MB (${TOTAL} bytes)"
          if [ $TOTAL -gt 15728640 ]; then
            echo "❌ dist/ exceeds 15MB limit ($TOTAL bytes)"
            exit 1
          elif [ $TOTAL -gt 5242880 ]; then
            echo "⚠️  dist/ is over 5MB — check bundle analyzer"
          else
            echo "✅ Bundle size OK"
          fi

      # ── 7. Wrangler config validation (dry-run) ──────────────────────────
      - name: Validate wrangler config
        run: npx wrangler deploy --env="" --dry-run 2>&1 | tail -5 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── 8. Summary ───────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  BREAKTAPES CI — ${{ github.head_ref }} → ${{ github.base_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit : ${{ github.sha }}"
          echo "  Author : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
