name: CI

on:
  pull_request:
    branches:
      - staging
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. index.html exists ─────────────────────────────────────────────
      - name: Check index.html exists
        run: |
          if [ ! -f index.html ]; then
            echo "❌ index.html not found"
            exit 1
          fi
          echo "✅ index.html exists"

      # ── 2. Required env-detection markers present ────────────────────────
      - name: Check env-detection markers
        run: |
          MARKERS=("_IS_PROD" "_IS_STAGING" "SUPABASE_URL" "SUPABASE_ANON_KEY" "applyEnvRestrictions" "kmdpufauamadwavqsinj" "yqzycwuyhvzkbofwkazr")
          FAILED=0
          for marker in "${MARKERS[@]}"; do
            if ! grep -q "$marker" index.html; then
              echo "❌ Missing required marker: $marker"
              FAILED=1
            else
              echo "✅ Found: $marker"
            fi
          done
          if [ $FAILED -eq 1 ]; then exit 1; fi

      # ── 3. File size check (warn at 5MB, fail at 10MB) ───────────────────
      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          SIZE_MB=$(echo "scale=2; $SIZE / 1048576" | bc)
          echo "index.html size: ${SIZE_MB} MB (${SIZE} bytes)"
          if [ $SIZE -gt 10485760 ]; then
            echo "❌ index.html exceeds 10MB limit ($SIZE bytes)"
            exit 1
          elif [ $SIZE -gt 5242880 ]; then
            echo "⚠️  index.html is over 5MB — consider splitting"
          else
            echo "✅ File size OK"
          fi

      # ── 4. wrangler.toml has both environments ───────────────────────────
      - name: Check wrangler.toml environments
        run: |
          if ! grep -q 'app.breaktapes.com' wrangler.toml; then
            echo "❌ wrangler.toml missing production route (app.breaktapes.com)"
            exit 1
          fi
          if ! grep -q 'dev.breaktapes.com' wrangler.toml; then
            echo "❌ wrangler.toml missing staging route (dev.breaktapes.com)"
            exit 1
          fi
          if ! grep -q '\[env.staging\]' wrangler.toml; then
            echo "❌ wrangler.toml missing [env.staging] block"
            exit 1
          fi
          echo "✅ wrangler.toml has both production and staging environments"

      # ── 5. public/ sync check ────────────────────────────────────────────
      - name: Sync index.html → public/
        run: |
          mkdir -p public
          cp index.html public/index.html
          echo "✅ public/index.html synced from index.html"

      # ── 6. Wrangler config validation (dry-run) ──────────────────────────
      - name: Validate wrangler config
        run: npx wrangler deploy --env="" --dry-run 2>&1 | tail -5 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── 7. Summary ───────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  BREAKTAPES CI — ${{ github.head_ref }} → ${{ github.base_ref }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Commit : ${{ github.sha }}"
          echo "  Author : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
