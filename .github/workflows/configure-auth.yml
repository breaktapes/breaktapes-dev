name: Configure Supabase Auth Settings

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Staging — disable email confirmation
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_STAGING_PROJECT_REF }}/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"mailer_autoconfirm": true, "enable_signup": true}' \
            | python3 -m json.tool

      - name: Production — require email confirmation
        run: |
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROD_PROJECT_REF }}/config/auth" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"mailer_autoconfirm": false, "enable_signup": true}' \
            | python3 -m json.tool
