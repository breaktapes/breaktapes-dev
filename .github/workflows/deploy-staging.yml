name: Deploy → Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to dev.breaktapes.com
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://dev.breaktapes.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Node.js + build ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://yqzycwuyhvzkbofwkazr.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_XiI5lGzh_3rWoA2TxrKnWg_gPtPKSRp
          VITE_IS_STAGING: 'true'
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_ADMIN_USER_IDS: ${{ vars.VITE_ADMIN_USER_IDS }}

      # ── 2. Push Supabase migrations → staging ────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to staging Supabase
        run: |
          if [ -z "$SUPABASE_STAGING_DB_PASSWORD" ]; then
            echo "⚠️  SUPABASE_STAGING_DB_PASSWORD not set — skipping migrations."
            echo "   Reset DB password at: https://supabase.com/dashboard/project/yqzycwuyhvzkbofwkazr/settings/database"
            echo "   Then add it to GitHub secrets: Settings → Secrets → Actions → SUPABASE_STAGING_DB_PASSWORD"
            exit 0
          fi
          supabase link \
            --project-ref "$SUPABASE_STAGING_PROJECT_REF" \
            --password "$SUPABASE_STAGING_DB_PASSWORD"
          supabase db push \
            --linked \
            --password "$SUPABASE_STAGING_DB_PASSWORD" \
            --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_STAGING_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

      # ── 3. Deploy to Cloudflare Workers (staging) ────────────────────────
      - name: Deploy to Cloudflare staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── 4. Summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ STAGING DEPLOYED"
          echo "  URL    : https://dev.breaktapes.com"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  By     : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
