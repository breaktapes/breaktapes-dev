name: Deploy → Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to dev.breaktapes.com
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://dev.breaktapes.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Sync index.html → public/ ─────────────────────────────────────
      - name: Sync index.html → public/
        run: |
          mkdir -p public
          cp index.html public/index.html
          echo "✅ public/index.html synced"

      # ── 2. Push Supabase migrations → staging ────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to staging Supabase
        run: |
          supabase link \
            --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          supabase db push \
            --linked \
            --password ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }} \
            --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── 3. Deploy to Cloudflare Workers (staging) ────────────────────────
      - name: Deploy to Cloudflare staging
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # ── 4. Summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅ STAGING DEPLOYED"
          echo "  URL    : https://dev.breaktapes.com"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  By     : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
