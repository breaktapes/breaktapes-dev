name = "breaktapes-app"
main = "worker/index.js"
compatibility_date = "2024-09-23"
account_id = "b09f233e618dc7f23bcb247c947eb303"

assets = { directory = "dist", html_handling = "auto-trailing-slash", binding = "ASSETS" }

# Production: app.breaktapes.com
# Deploy: wrangler deploy
routes = [
  { pattern = "app.breaktapes.com/*", zone_id = "7d1d8be858893e977e57b0455ed2388f" }
]

[vars]
SUPABASE_URL = "https://kmdpufauamadwavqsinj.supabase.co"

# Secrets (set via `wrangler secret put`):
#   SUPABASE_ANON_KEY
#   ADMIN_USER_IDS  — comma-separated Clerk user IDs with admin access
#                     e.g. "user_2abc...,user_2xyz..."

# KV for profile view counts (optional — Worker works without it):
#   1. wrangler kv:namespace create "profile-cache"
#   2. Add the returned IDs below and uncomment:
# [[kv_namespaces]]
# binding = "PROFILE_KV"
# id = "<KV_NAMESPACE_ID>"
# preview_id = "<KV_PREVIEW_ID>"

# Staging: dev.breaktapes.com
# Deploy: wrangler deploy --env staging
[env.staging]
name = "breaktapes-app-staging"
main = "worker/index.js"
assets = { directory = "dist", html_handling = "auto-trailing-slash", binding = "ASSETS" }
routes = [
  { pattern = "dev.breaktapes.com/*", zone_id = "7d1d8be858893e977e57b0455ed2388f" }
]

[env.staging.vars]
SUPABASE_URL = "https://yqzycwuyhvzkbofwkazr.supabase.co"

# Secrets for staging (set via `wrangler secret put --env staging`):
#   SUPABASE_ANON_KEY
#   ADMIN_USER_IDS

# [[env.staging.kv_namespaces]]
# binding = "PROFILE_KV"
# id = "<KV_STAGING_NAMESPACE_ID>"
# preview_id = "<KV_STAGING_PREVIEW_ID>"
